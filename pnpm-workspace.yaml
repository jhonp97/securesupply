# ─────────────────────────────────────────────
# SecureSupply — workspace de pnpm
# ─────────────────────────────────────────────
packages:
  - "apps/*"
  - "packages/*"
# Los builds están bloqueados globalmente via ignore-scripts=true en .npmrc
# Excepción documentada para Prisma Generate (ejecutar manualmente)
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': false
  bcrypt: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  ssh2: true
minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.60.0'
  - '@typescript-eslint/parser@8.60.0'
  - '@typescript-eslint/project-service@8.60.0'
  - '@typescript-eslint/scope-manager@8.60.0'
  - '@typescript-eslint/tsconfig-utils@8.60.0'
  - '@typescript-eslint/type-utils@8.60.0'
  - '@typescript-eslint/types@8.60.0'
  - '@typescript-eslint/typescript-estree@8.60.0'
  - '@typescript-eslint/utils@8.60.0'
  - '@typescript-eslint/visitor-keys@8.60.0'
  - typescript-eslint@8.60.0
  - '@nestjs/common@11.1.24'
  - '@nestjs/core@11.1.24'
  - '@nestjs/platform-express@11.1.24'
  - bullmq@5.77.3
  - '@testcontainers/postgresql@12.0.1'
  - '@testcontainers/redis@12.0.1'
  - testcontainers@12.0.1
